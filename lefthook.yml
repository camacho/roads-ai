pre-commit:
  parallel: true
  commands:
    format:
      glob: '*.{js,ts,md,yml,yaml}'
      run: pnpm prettier --write {staged_files}
      stage_fixed: true
    format-package:
      glob: '**/package.json'
      run: pnpm exec format-package --write {staged_files}
      stage_fixed: true
    typecheck:
      glob: '*.{js,ts}'
      run: pnpm typecheck
    test:
      glob: 'packages/*/**/*'
      run: pnpm -r --filter='...[HEAD]' test
